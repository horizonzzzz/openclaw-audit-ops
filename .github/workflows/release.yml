name: Publish Packages to npm

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin package
        run: pnpm --filter @horizonzzzz/audit-ops build

      - name: Build admin package
        run: pnpm --filter @horizonzzzz/audit-ops-admin build

      - name: Verify tag matches package versions
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION="$(node -p "require('./packages/plugin/package.json').version")"
          ADMIN_VERSION="$(node -p "require('./apps/admin/package.json').version")"

          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match plugin version $PLUGIN_VERSION"
            exit 1
          fi

          if [ "$ADMIN_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match admin version $ADMIN_VERSION"
            exit 1
          fi

      - name: Publish plugin package
        run: pnpm --filter @horizonzzzz/audit-ops publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish admin package
        run: pnpm --filter @horizonzzzz/audit-ops-admin publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
